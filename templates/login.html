<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вхід — Майстерня Аналізатор</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">

<div style="width:100%;max-width:400px;padding:24px">

  <div style="text-align:center;margin-bottom:32px">
    <div style="font-size:48px;margin-bottom:12px">🎭</div>
    <div style="font-size:22px;font-weight:700;color:var(--accent)">Майстерня</div>
    <div style="font-size:14px;color:var(--text-muted);margin-top:4px">Аналізатор · Код Харизми</div>
  </div>

  <div class="card">
    <div style="font-size:18px;font-weight:600;margin-bottom:20px">Вхід до системи</div>

    {% if error %}
    <div class="alert alert-error" style="margin-bottom:16px">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="your@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:8px">
        Увійти →
      </button>
    </form>
  </div>

</div>
</body>
</html>
