<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Налаштування — Майстерня Аналізатор</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
<div style="width:100%;max-width:420px;padding:24px">
  <div style="text-align:center;margin-bottom:32px">
    <div style="font-size:48px;margin-bottom:12px">⚙️</div>
    <div style="font-size:22px;font-weight:700;color:var(--accent)">Перше налаштування</div>
    <div style="font-size:14px;color:var(--text-muted);margin-top:4px">Створення адміністратора</div>
  </div>
  <div class="card">
    {% if error %}<div class="alert alert-error" style="margin-bottom:16px">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" placeholder="admin@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Ім'я</label>
        <input class="form-control" type="text" name="name" placeholder="Ім'я Прізвище" required>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Секретний ключ (SECRET_KEY з .env)</label>
        <input class="form-control" type="password" name="secret" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px">
        Створити адміністратора →
      </button>
    </form>
  </div>
</div>
</body>
</html>
